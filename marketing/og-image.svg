<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" font-family="'IBM Plex Mono', monospace">
  <defs>
    <radialGradient id="glow1" cx="0.15" cy="0.2" r="0.5">
      <stop offset="0%" stop-color="#4ecdc4" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#4ecdc4" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="0.85" cy="0.85" r="0.5">
      <stop offset="0%" stop-color="#6b9cf0" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#6b9cf0" stop-opacity="0"/>
    </radialGradient>
    <pattern id="dots" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="0.6" fill="#56687d" opacity="0.18"/>
    </pattern>
  </defs>

  <rect width="1200" height="630" fill="#0a0e17"/>
  <rect width="1200" height="630" fill="url(#glow1)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>
  <rect width="1200" height="630" fill="url(#dots)"/>

  <!-- logo -->
  <text x="80" y="120" font-size="28" letter-spacing="9" fill="#4ecdc4" font-weight="400">
    FRONTDOOR
  </text>
  <circle cx="290" cy="110" r="5" fill="#4ecdc4" opacity="0.7"/>

  <!-- headline -->
  <text x="80" y="290" font-family="'IBM Plex Sans', sans-serif" font-size="64" font-weight="300" fill="#d0dce8">
    A browser start page that
  </text>
  <text x="80" y="370" font-family="'IBM Plex Sans', sans-serif" font-size="64" font-weight="300" fill="#d0dce8">
    respects your attention.
  </text>

  <!-- tagline -->
  <text x="80" y="450" font-size="22" letter-spacing="2" fill="#56687d">
    DENSE · CALM · ONE SCREEN · NO DOPAMINE LOOPS
  </text>

  <!-- arc strip at the bottom -->
  <g transform="translate(80, 540)">
    <text font-size="14" letter-spacing="3" fill="#8494a7">
      <tspan>ARRIVE</tspan>
      <tspan dx="20" fill="#56687d">·</tspan>
      <tspan dx="20">ACT</tspan>
      <tspan dx="20" fill="#56687d">·</tspan>
      <tspan dx="20">REWARD</tspan>
      <tspan dx="20" fill="#56687d">·</tspan>
      <tspan dx="20">READ</tspan>
      <tspan dx="20" fill="#56687d">·</tspan>
      <tspan dx="20">DISCOVER</tspan>
      <tspan dx="20" fill="#56687d">·</tspan>
      <tspan dx="20">DEPART</tspan>
    </text>
  </g>
</svg>
